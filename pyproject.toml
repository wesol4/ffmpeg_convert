[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
# Pragmatyczny zestaw: błędy pycodestyle (E), pyflakes (F, m.in. nieużywane
# importy), warnings (W). Bez isort (I) — psułby kolejność bootstrapu importu
# w cli.py/gui.py (sys.path przed `from app import …`).
select = ["E", "F", "W"]

[tool.mypy]
python_version = "3.12"
packages = ["app"]
# Pragmatyczne, nie --strict: wymuszamy adnotacje definicji i ostrzegamy na
# return any / nieużywane ignore. Największy zwrot z Path/Job/VideoPreset/SeqFormat.
disallow_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
ignore_missing_imports = false
# GUI (PyQt5) i CLI (argparse dynamiczny) są nietypowane — moduły gui_*.py
# (podział Sprintu 4) i cli.py wyłączamy; rdzeń (core/presets/runner) typujemy.
exclude = ["app/gui.*\\.py", "app/cli\\.py"]

# PyQt5 nie ma stubów — ignorujemy brak importów.
[[tool.mypy.overrides]]
module = "PyQt5.*"
ignore_missing_imports = true